<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Panadería{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#efe3c6]">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#9c775b] text-white flex flex-col items-center py-6">
        <div class="mb-10">
            <img src="{{ url_for('static', filename='img/logo.png') }}" class="w-24">
        </div>

        <nav class="w-full">
            <a href="#" class="block px-6 py-3 bg-[#b9772b]">
                Productos
            </a>
        </nav>
    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
