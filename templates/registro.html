{% extends "layout.html" %}
{% block title %}Registro | El Trigal{% endblock %}
{% block container %}
<section class="auth-card auth-card--wide">
    <header class="auth-copy">
        <p class="eyebrow">Nuevo acceso</p>
        <h1>Registrarme</h1>
        <p>Crea tu cuenta en la panaderia con un formulario renderizado por Flask y Jinja.</p>
    </header>

    <form class="auth-form" action="{{ url_for('registro') }}" method="get">
        <input name="nombre" type="text" placeholder="Nombre completo" autocomplete="name">
        <input name="usuario" type="text" placeholder="Usuario" autocomplete="username">
        <input name="correo" type="email" placeholder="Correo electronico" autocomplete="email">
        <input name="contrasena" type="password" placeholder="Contrasena" autocomplete="new-password">

        <button class="primary-button" type="button">Crear cuenta</button>
        <a class="secondary-button secondary-button--ghost" href="{{ url_for('index') }}">Volver al acceso</a>
    </form>
</section>
{% endblock %}
