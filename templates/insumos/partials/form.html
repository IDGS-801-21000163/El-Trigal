<form method="POST" enctype="multipart/form-data" class="form-container">
    {{ form.hidden_tag() }}

    <div class="form-layout">
        <div class="form-layout__media">
            {% if imagen %}
            <img id="preview-image" class="detail-avatar detail-avatar--square detail-avatar--large" src="{{ imagen }}" alt="Vista previa">
            {% else %}
            <div id="preview-fallback" class="detail-avatar placeholder detail-avatar--square detail-avatar--large">INS</div>
            <img id="preview-image" class="detail-avatar detail-avatar--square detail-avatar--large is-hidden" src="" alt="Vista previa">
            {% endif %}
        </div>

        <div class="form-layout__fields">
            <h3 class="form-section-title">{{ action_label }} insumo</h3>

            <div class="form-grid">
                <label class="form-group">
                    <span>{{ form.nombre.label.text }}</span>
                    {{ form.nombre(class="form-input") }}
                    {% if form.nombre.errors %}<span class="form-error">{{ form.nombre.errors[0] }}</span>{% endif %}
                </label>
                <label class="form-group">
                    <span>{{ form.fk_categoria.label.text }}</span>
                    {{ form.fk_categoria(class="form-input") }}
                    {% if form.fk_categoria.errors %}<span class="form-error">{{ form.fk_categoria.errors[0] }}</span>{% endif %}
                </label>
                <label class="form-group">
                    <span>{{ form.porcentaje_merma.label.text }}</span>
                    {{ form.porcentaje_merma(class="form-input", step="0.01", min="0", max="100") }}
                    {% if form.porcentaje_merma.errors %}<span class="form-error">{{ form.porcentaje_merma.errors[0] }}</span>{% endif %}
                </label>
>
                <label class="form-group form-group--full">
                    <span>{{ form.foto.label.text }}</span>
                    {{ form.foto(class="form-input", accept=".png,.jpg,.jpeg") }}
                    {% if form.foto.errors %}<span class="form-error">{{ form.foto.errors[0] }}</span>{% endif %}
                </label>
            </div>
        </div>
    </div>

    <div class="button-row">
        <button type="submit" class="btn btn-primary">{{ action_label }}</button>
        <a href="{{ url_for('insumos.inicio') }}" class="btn btn-outline">Cancelar</a>
    </div>
</form>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("foto");
    const image = document.getElementById("preview-image");
    const fallback = document.getElementById("preview-fallback");
    if (!input || !image) return;
    input.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        image.src = URL.createObjectURL(file);
        image.classList.remove("is-hidden");
        if (fallback) fallback.classList.add("is-hidden");
    });
});
</script>
