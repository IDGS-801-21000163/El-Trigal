{% extends 'base.html' %}
{% block title %}Nueva Producción{% endblock %}

{% block content %}

<h1 class="text-2xl font-bold text-[#7a5d47] mb-6">
    Nueva orden de producción
</h1>

<form method="POST" class="bg-white p-6 rounded-xl shadow w-2/3">

    <div class="grid grid-cols-2 gap-4 mb-4">

        <select name="producto_id" class="p-2 border rounded-lg">
            <option>Producto a producir</option>
            {% for p in productos %}
                <option value="{{ p.id }}">{{ p.nombre }}</option>
            {% endfor %}
        </select>

        <input type="number" name="cantidad"
            placeholder="Cantidad solicitada"
            class="p-2 border rounded-lg" min=1 required>

        <select name="empleado" class="p-2 border rounded-lg col-span-2">
            <option>Empleado responsable</option>
            {% for e in empleados %}
                <option value="{{ e.id }}">{{ e.nombre }}</option>
            {% endfor %}
        </select>

    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <p class="text-red-600 text-sm mb-3">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}

    <div class="flex gap-4">
        <button class="bg-[#7a5d47] text-white px-6 py-2 rounded-lg">
            Guardar
        </button>

        <a href="{{ url_for('produccion.inicio') }}"
           class="bg-[#c49a6c] px-6 py-2 rounded-lg text-white">
            Regresar
        </a>
    </div>

</form>

{% endblock %}
